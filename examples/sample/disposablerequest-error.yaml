apiVersion: http.m.crossplane.io/v1alpha2
kind: DisposableRequest
metadata:
  name: sample-error
  namespace: default
  annotations:
    # Ensure the test server is reachable and the error endpoint behaves as expected
    uptest.upbound.io/pre-assert-hook: ../../test/hooks/check-error-endpoint.sh
    # Verify status.error is populated after deployment
    uptest.upbound.io/post-assert-hook: ../../test/hooks/verify-error-status.sh
    # Wait for ErrorObserved condition instead of Ready
    uptest.upbound.io/conditions: "ErrorObserved"
spec:
  forProvider:
    url: http://test-server.default.svc.cluster.local/v1/error
    method: POST
    headers:
      Content-Type:
        - application/json
      Authorization:
        - "Bearer {{ auth:default:token }}"
    # We expect this endpoint to return HTTP 500 so we test error behavior
    # Note: NOT using shouldLoopInfinitely so the error is captured and resource becomes synced
    rollbackRetriesLimit: 3
    nextReconcile: 10s
    waitTimeout: 10s
  providerConfigRef:
    name: http-conf-namespaced
    kind: ProviderConfig
